<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue lamp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero">
       <nav>
           <img src="images/menu.png" alt="Menu" class="menu-img">
           <img src="images/logo.png" alt="logo" class="logo-img">
           <ul>
            <li><a href="">Latest</a></li>
            <li><a href="">Mordern</a></li>
            <li><a href="">Contemporary</a></li>
            <li><a href="">Affordable</a></li>
        </ul>
        <button type="button" onclick="toggleBtn()" id="btn"><span></span></button>
       </nav>

       <div class="lamp-container">
           <img src="images/lamp.png" alt="lamp" class="lamp">
           <img src="images/light.png" alt="light" class="light" id="light">
       </div>

       <div class="text-container">
           <h1>Latest in Lighting</h1>
           <p>This is the first lamp from out company. We're making a huge
               collection of modern lamps in all categories from home use to
               office use.
           </p>
           <a href="">Check All Colections</a>
           <div class="control">
               <p>04</p>
               <div class="line"><span></span></div>
               <p>05</p>
           </div>
       </div>
    </div>


<script>
    var btn = document.getElementById("btn");

    function toggleBtn(){
        btn.classList.toggle("active");
        light.classList.toggle("on");
    }

</script>
</body>
</html>
